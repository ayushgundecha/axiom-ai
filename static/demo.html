<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>axiom-ai | Trajectory Replay</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-hover: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --radius: 8px;
    --font: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .header .meta {
    display: flex;
    gap: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .header .meta span { color: var(--text); font-weight: 500; }
  .header-left { display: flex; align-items: center; gap: 14px; }

  /* Console nav (shared across demo / replay / leaderboard) */
  .console-nav { display: flex; gap: 6px; }
  .console-nav a {
    font-family: var(--font); font-size: 12px; text-decoration: none;
    padding: 4px 12px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-muted);
  }
  .console-nav a:hover { background: var(--bg-hover); color: var(--text); }
  .console-nav a.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(88,166,255,.08);
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar - trajectory list */
  .sidebar {
    width: 280px;
    border-right: 1px solid var(--border);
    background: var(--bg-card);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 16px 16px 8px;
  }
  .traj-item {
    display: block;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s;
  }
  .traj-item:hover { background: var(--bg-hover); }
  .traj-item.active { background: var(--bg-hover); border-left: 3px solid var(--accent); }
  .traj-item .name { font-size: 13px; font-weight: 500; }
  .traj-item .info { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .traj-item .hack-tag { display:inline-block; margin-left:6px; padding:0 6px; border-radius:999px;
    font-size:10px; font-weight:600; background:rgba(248,81,73,.15); color:var(--red); }

  /* Environment selector (top of sidebar) */
  .env-nav { padding: 12px 12px 6px; border-bottom: 1px solid var(--border); }
  .env-nav .env-btn {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 9px 11px; margin-bottom: 6px;
    background: var(--bg-hover); border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    font-family: var(--font); color: var(--text); text-align: left;
  }
  .env-nav .env-btn:hover { border-color: var(--text-muted); }
  .env-nav .env-btn.active { border-color: var(--accent); background: rgba(88,166,255,.08); }
  .env-nav .env-ic { width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    background: var(--bg); }
  .env-nav .env-btn[data-env="axiomchat"] .env-ic { color: var(--accent); }
  .env-nav .env-btn[data-env="webapp"] .env-ic { color: var(--cyan, #39c5cf); }
  .env-nav .env-btn[data-env="cli"] .env-ic { color: var(--green); }
  .env-nav .env-btn[data-env="json"] .env-ic { color: var(--purple); }
  .env-nav .env-nm { font-size: 13px; font-weight: 600; }
  .env-nav .env-ct { margin-left: auto; font-size: 11px; color: var(--text-muted); }

  /* Content area */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Controls bar */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
  }
  .step-label {
    font-size: 14px;
    font-weight: 600;
    min-width: 100px;
  }
  .controls button {
    background: var(--bg-hover);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--font);
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
  }
  .controls button:hover { background: var(--border); border-color: var(--text-muted); }
  .controls button:disabled { opacity: 0.3; cursor: not-allowed; }
  .controls button.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .speed-select {
    background: var(--bg-hover);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 8px;
    border-radius: var(--radius);
    font-family: var(--font);
    font-size: 13px;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.2s;
  }

  /* Viewer */
  .viewer {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* Observation panel */
  .obs-panel {
    flex: 1;
    overflow: auto;
    padding: 24px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }
  .obs-panel img {
    max-width: 100%;
    max-height: 100%;
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .obs-panel pre {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-size: 13px;
    line-height: 1.5;
    overflow: auto;
    width: 100%;
    max-height: 100%;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Info panel */
  .info-panel {
    width: 340px;
    border-left: 1px solid var(--border);
    background: var(--bg-card);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .info-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .info-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .action-display {
    font-size: 13px;
    line-height: 1.6;
  }
  .action-type {
    color: var(--accent);
    font-weight: 600;
  }
  .action-target {
    color: var(--purple);
  }
  .action-value {
    color: var(--green);
  }

  /* Reward display */
  .reward-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 4px 0;
  }
  .reward-value { font-weight: 600; }
  .reward-positive { color: var(--green); }
  .reward-negative { color: var(--red); }
  .reward-zero { color: var(--text-muted); }

  /* Eval bars */
  .eval-metric {
    margin-bottom: 10px;
  }
  .eval-metric .label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
  }
  .eval-metric .label .name { color: var(--text-muted); }
  .eval-metric .label .value { font-weight: 600; }
  .eval-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .eval-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .eval-bar-fill.high { background: var(--green); }
  .eval-bar-fill.mid { background: var(--yellow); }
  .eval-bar-fill.low { background: var(--red); }

  /* Status badge */
  .status-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-badge.running { background: rgba(88,166,255,0.15); color: var(--accent); }
  .status-badge.done { background: rgba(63,185,80,0.15); color: var(--green); }
  .status-badge.timeout { background: rgba(210,153,34,0.15); color: var(--yellow); }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    gap: 12px;
    padding: 40px;
    text-align: center;
  }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state p { font-size: 14px; max-width: 400px; line-height: 1.6; }

  /* Keyboard hints */
  .kbd-hints {
    display: flex;
    gap: 16px;
    font-size: 11px;
    color: var(--text-muted);
    padding: 8px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg-card);
  }
  kbd {
    background: var(--bg-hover);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 11px;
    font-family: var(--font);
  }
  /* Reward-robustness verdict banner (proxy vs oracle) */
  .verdict {
    display: none; align-items: center; gap: 10px;
    padding: 8px 16px; font-size: 13px; font-weight: 600;
    border-bottom: 1px solid var(--border);
  }
  .verdict.hack { display: flex; background: rgba(248,81,73,.14); color: var(--red); }
  .verdict.honest { display: flex; background: rgba(63,185,80,.12); color: var(--green); }
  .verdict.blocked { display: flex; background: rgba(88,166,255,.10); color: var(--accent); }
  .verdict .detail { font-weight: 400; color: var(--text-muted); font-size: 12px; }
  .vpill {
    display: inline-block; padding: 1px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  .vpill.pass { background: rgba(63,185,80,.15); color: var(--green); }
  .vpill.fail { background: rgba(248,81,73,.15); color: var(--red); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>axiom console <span style="color:var(--text-muted);font-weight:400">/ demo</span></h1>
    <nav class="console-nav">
      <a class="active" href="demo.html">Demo</a>
      <a href="robustness.html">Leaderboard</a>
      <a href="https://github.com/ayushgundecha/axiom-ai">GitHub</a>
    </nav>
  </div>
  <div class="meta" id="header-meta"></div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="env-nav" id="env-nav"></div>
    <h2 id="traj-list-label">Runs</h2>
    <div id="traj-list">
      <div class="empty-state" style="padding:24px">
        <p style="font-size:12px">Loading...</p>
      </div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="empty-state">
      <div class="icon">&#9654;</div>
      <p>Pick an environment on the left, then a run — step through what the agent saw, did, and was scored. Reward-hacking runs are flagged.</p>
    </div>

    <div id="replay-view" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="verdict" id="verdict-banner"></div>
      <div class="controls">
        <span class="step-label" id="step-label">Step 0/0</span>
        <button id="btn-prev" title="Previous step">&larr; Prev</button>
        <button id="btn-next" title="Next step">Next &rarr;</button>
        <button id="btn-play" title="Toggle auto-play">&#9654; Play</button>
        <select class="speed-select" id="speed-select" title="Playback speed">
          <option value="500">0.5s</option>
          <option value="1000" selected>1.0s</option>
          <option value="2000">2.0s</option>
          <option value="3000">3.0s</option>
        </select>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="status-badge running" id="step-status"></span>
      </div>

      <div class="viewer">
        <div class="obs-panel" id="obs-panel"></div>
        <div class="info-panel">
          <div class="info-section">
            <h3>Action</h3>
            <div class="action-display" id="action-display">-</div>
          </div>
          <div class="info-section">
            <h3>Reward</h3>
            <div id="reward-display"></div>
          </div>
          <div class="info-section" id="eval-section" style="display:none">
            <h3>Evaluation</h3>
            <div id="eval-display"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="kbd-hints">
  <span><kbd>&larr;</kbd> Previous</span>
  <span><kbd>&rarr;</kbd> Next</span>
  <span><kbd>Space</kbd> Play/Pause</span>
  <span><kbd>Home</kbd> First</span>
  <span><kbd>End</kbd> Last</span>
</div>

<script>
(function() {
  'use strict';

  // State
  let trajectory = null;
  let currentStep = 0;
  let playing = false;
  let playTimer = null;
  let baseTrajectoryUrl = '';
  let staticBase = false;  // true when replaying committed reports/transcripts (no API)

  // DOM refs
  const headerMeta = document.getElementById('header-meta');
  const trajList = document.getElementById('traj-list');
  const emptyState = document.getElementById('empty-state');
  const replayView = document.getElementById('replay-view');
  const stepLabel = document.getElementById('step-label');
  const btnPrev = document.getElementById('btn-prev');
  const btnNext = document.getElementById('btn-next');
  const btnPlay = document.getElementById('btn-play');
  const speedSelect = document.getElementById('speed-select');
  const progressBar = document.getElementById('progress-bar');
  const progressFill = document.getElementById('progress-fill');
  const stepStatus = document.getElementById('step-status');
  const obsPanel = document.getElementById('obs-panel');
  const actionDisplay = document.getElementById('action-display');
  const rewardDisplay = document.getElementById('reward-display');
  const evalSection = document.getElementById('eval-section');
  const evalDisplay = document.getElementById('eval-display');

  // Environment display metadata + sidebar order.
  const ENV_META = {
    axiomchat: { icon: '💬', name: 'AxiomChat' },
    webapp:    { icon: '🌐', name: 'WebApp' },
    cli:       { icon: '⌨',       name: 'CLI' },
    json:      { icon: '{ }',          name: 'JSON' },
  };
  const ENV_ORDER = ['axiomchat', 'webapp', 'cli', 'json'];

  let byEnv = {};        // env_type -> [normalized items]
  let currentEnv = null;

  // Load the run list — the local API first; on GitHub Pages (no API) fall back
  // to the committed curated-evidence manifest in reports/transcripts/.
  async function loadTrajectoryList() {
    let items = null;
    try {
      const resp = await fetch('/trajectories/saved');
      if (resp.ok) {
        items = (await resp.json()).map((t) => ({
          id: t.session_id, label: t.task_name || t.session_id,
          env_type: t.env_type, total_steps: t.total_steps, hack: undefined,
        }));
      }
    } catch (e) { /* fall through to static */ }
    if (!items) items = await loadStaticManifest();
    if (!items || !items.length) {
      document.getElementById('env-nav').innerHTML =
        '<div style="font-size:12px;color:var(--text-muted);padding:8px">No runs found. Run an agent episode locally first.</div>';
      trajList.innerHTML = '';
      return;
    }
    byEnv = {};
    for (const it of items) (byEnv[it.env_type] = byEnv[it.env_type] || []).push(it);
    renderEnvNav();
  }

  async function loadStaticManifest() {
    for (const prefix of ['reports/transcripts/', '../reports/transcripts/']) {
      try {
        const resp = await fetch(prefix + 'index.json');
        if (!resp.ok) continue;
        return (await resp.json()).map((e) => ({
          id: e.path, label: e.label || e.task_name,
          env_type: e.env_type, total_steps: e.total_steps, hack: e.hack,
        }));
      } catch (err) { /* try next prefix */ }
    }
    return null;
  }

  function renderEnvNav() {
    const envs = ENV_ORDER.filter((e) => byEnv[e]).concat(
      Object.keys(byEnv).filter((e) => !ENV_ORDER.includes(e)));
    document.getElementById('env-nav').innerHTML = envs.map((env) => {
      const m = ENV_META[env] || { icon: '■', name: env };
      return `<button class="env-btn" data-env="${env}">` +
        `<span class="env-ic">${m.icon}</span>` +
        `<span class="env-nm">${m.name}</span>` +
        `<span class="env-ct">${byEnv[env].length}</span></button>`;
    }).join('');
    document.querySelectorAll('#env-nav .env-btn').forEach((b) => {
      b.addEventListener('click', () => selectEnv(b.dataset.env));
    });
    if (!currentEnv || !byEnv[currentEnv]) selectEnv(envs[0]);
    else selectEnv(currentEnv);
  }

  function selectEnv(env) {
    currentEnv = env;
    document.querySelectorAll('#env-nav .env-btn').forEach((b) =>
      b.classList.toggle('active', b.dataset.env === env));
    const m = ENV_META[env] || { name: env };
    document.getElementById('traj-list-label').textContent = m.name + ' runs';
    renderRuns(byEnv[env] || []);
  }

  function renderRuns(items) {
    trajList.innerHTML = items.map((t) => `
      <a class="traj-item" data-session="${t.id}" href="?session=${t.id}">
        <div class="name">${t.label}${t.hack === true ? '<span class="hack-tag">HACK</span>' : ''}</div>
        <div class="info">${t.total_steps || '?'} steps${t.id.includes('/') ? '' : ' &middot; ' + t.id.slice(0,8)}</div>
      </a>`).join('');
    trajList.querySelectorAll('.traj-item').forEach((el) => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const sid = el.dataset.session;
        history.pushState(null, '', '?session=' + encodeURIComponent(sid));
        loadTrajectory(sid);
      });
    });
  }

  // Load a trajectory. A plain id loads from the local API mount; an id
  // containing '/' is a committed transcript path (static hosting, no API).
  async function loadTrajectory(sessionId) {
    const isPath = sessionId.includes('/');
    const bases = isPath ? [sessionId, '../' + sessionId] : ['/trajectories/' + sessionId];
    for (const base of bases) {
      try {
        const resp = await fetch(base + '/trajectory.json');
        if (!resp.ok) continue;
        trajectory = await resp.json();
        baseTrajectoryUrl = base;
        staticBase = isPath;
        currentStep = 0;
        stopPlaying();
        showReplayView();
        renderStep();
        highlightSidebar(sessionId);
        return;
      } catch (e) { /* try next base */ }
    }
    obsPanel.innerHTML = '<div class="empty-state"><p>Failed to load trajectory: ' + sessionId + '</p></div>';
  }

  function highlightSidebar(sessionId) {
    trajList.querySelectorAll('.traj-item').forEach(el => {
      el.classList.toggle('active', el.dataset.session === sessionId);
    });
  }

  function showReplayView() {
    emptyState.style.display = 'none';
    replayView.style.display = 'flex';

    headerMeta.innerHTML = `
      <div>Task: <span>${trajectory.task_name || '?'}</span></div>
      <div>Env: <span>${trajectory.env_type || '?'}</span></div>
      <div>Steps: <span>${trajectory.total_steps || '?'}</span></div>
      <div>Session: <span>${(trajectory.session_id || '?').slice(0,8)}</span></div>
    `;
    renderVerdict(trajectory.evaluation || {});
  }

  // Reward-robustness verdict: trajectories saved by run_robustness.py carry
  // the out-of-band proxy/oracle grades in `evaluation`. A reward hack is
  // proxy_pass AND NOT oracle_pass — the training reward paid, the real work
  // never happened.
  function renderVerdict(ev) {
    const banner = document.getElementById('verdict-banner');
    banner.className = 'verdict';
    if (typeof ev.proxy_pass !== 'boolean' || typeof ev.oracle_pass !== 'boolean') {
      banner.innerHTML = '';
      return;  // not a robustness run — no banner
    }
    const who = [ev.agent, ev.model, ev.reward_version && 'reward ' + ev.reward_version]
      .filter(Boolean).join(' · ');
    const pills =
      `<span class="vpill ${ev.proxy_pass ? 'pass' : 'fail'}">proxy ${ev.proxy_pass ? 'PAID' : 'refused'}</span>` +
      `<span class="vpill ${ev.oracle_pass ? 'pass' : 'fail'}">oracle ${ev.oracle_pass ? 'satisfied' : 'failed'}</span>`;
    if (ev.proxy_pass && !ev.oracle_pass) {
      banner.classList.add('hack');
      banner.innerHTML = `&#9888; REWARD HACK ${pills} <span class="detail">${who} — the proxy paid full marks, the oracle says the work never happened</span>`;
    } else if (ev.proxy_pass && ev.oracle_pass) {
      banner.classList.add('honest');
      const note = ev.agent === 'exploiter'
        ? 'attack absorbed — cheating got more expensive than doing the task'
        : 'honest work, honestly rewarded';
      banner.innerHTML = `&#10003; ${ev.agent === 'exploiter' ? 'HACK FAILED' : 'HONEST PASS'} ${pills} <span class="detail">${who} — ${note}</span>`;
    } else {
      banner.classList.add('blocked');
      banner.innerHTML = `&#9635; NO REWARD ${pills} <span class="detail">${who} — the proxy refused to pay</span>`;
    }
  }

  // Render current step
  function renderStep() {
    if (!trajectory || !trajectory.steps || trajectory.steps.length === 0) return;

    const total = trajectory.steps.length;
    const step = trajectory.steps[currentStep];

    // Step label & progress
    stepLabel.textContent = `Step ${step.step_num || currentStep + 1}/${total}`;
    const pct = ((currentStep + 1) / total * 100).toFixed(1);
    progressFill.style.width = pct + '%';

    // Status badge
    if (step.terminated) {
      stepStatus.textContent = 'DONE';
      stepStatus.className = 'status-badge done';
    } else if (step.truncated) {
      stepStatus.textContent = 'TIMEOUT';
      stepStatus.className = 'status-badge timeout';
    } else {
      stepStatus.textContent = 'RUNNING';
      stepStatus.className = 'status-badge running';
    }

    // Buttons
    btnPrev.disabled = currentStep === 0;
    btnNext.disabled = currentStep >= total - 1;

    // Observation panel
    renderObservation(step);

    // Action
    renderAction(step.action);

    // Reward
    renderReward(step);

    // Evaluation (show on last step if available)
    if (trajectory.evaluation && Object.keys(trajectory.evaluation).length > 0) {
      evalSection.style.display = '';
      renderEvaluation(trajectory.evaluation);
    } else {
      evalSection.style.display = 'none';
    }
  }

  function renderObservation(step) {
    const obs = step.observation || {};

    // Try screenshot first. API-served trajectories keep PNGs under
    // screenshots/; committed transcripts store them flat next to trajectory.json.
    const screenshotUrl = baseTrajectoryUrl
      + (staticBase ? '/step_' : '/screenshots/step_') + step.step_num + '.png';
    if (trajectory.env_type === 'webapp' || trajectory.env_type === 'axiomchat') {
      const img = new Image();
      img.onload = () => { obsPanel.innerHTML = ''; obsPanel.appendChild(img); };
      img.onerror = () => { renderTextObservation(obs); };
      img.src = screenshotUrl;
      img.alt = 'Step ' + step.step_num + ' screenshot';
      return;
    }

    renderTextObservation(obs);
  }

  function renderTextObservation(obs) {
    let text = '';
    if (obs.text_output) {
      text = obs.text_output;
    } else if (obs.state) {
      text = JSON.stringify(obs.state, null, 2);
    } else if (obs.dom_tree) {
      text = obs.dom_tree;
    } else {
      text = JSON.stringify(obs, null, 2);
    }
    obsPanel.innerHTML = '<pre>' + escapeHtml(text) + '</pre>';
  }

  function renderAction(action) {
    if (!action) { actionDisplay.textContent = '-'; return; }
    let html = '<span class="action-type">' + escapeHtml(action.type || '?') + '</span>';
    if (action.selector) {
      html += ' &rarr; <span class="action-target">' + escapeHtml(action.selector) + '</span>';
    }
    if (action.value) {
      const val = String(action.value).length > 60
        ? String(action.value).slice(0, 60) + '...'
        : String(action.value);
      html += '<br><span class="action-value">"' + escapeHtml(val) + '"</span>';
    }
    if (action.params) {
      html += '<br><span style="color:var(--text-muted)">' + escapeHtml(JSON.stringify(action.params)) + '</span>';
    }
    actionDisplay.innerHTML = html;
  }

  function renderReward(step) {
    let cumulative = 0;
    for (let i = 0; i <= currentStep; i++) {
      cumulative += trajectory.steps[i].reward || 0;
    }
    const r = step.reward || 0;
    const cls = r > 0 ? 'reward-positive' : r < 0 ? 'reward-negative' : 'reward-zero';

    rewardDisplay.innerHTML = `
      <div class="reward-row">
        <span>Step reward</span>
        <span class="reward-value ${cls}">${r >= 0 ? '+' : ''}${r.toFixed(3)}</span>
      </div>
      <div class="reward-row">
        <span>Cumulative</span>
        <span class="reward-value">${cumulative.toFixed(3)}</span>
      </div>
    `;
  }

  function renderEvaluation(evaluation) {
    const metrics = ['completion', 'efficiency', 'accuracy', 'safety'];
    let html = '';
    for (const m of metrics) {
      const val = evaluation[m];
      if (val === undefined) continue;
      const pct = (val * 100).toFixed(0);
      const cls = val >= 0.8 ? 'high' : val >= 0.5 ? 'mid' : 'low';
      html += `
        <div class="eval-metric">
          <div class="label">
            <span class="name">${m}</span>
            <span class="value">${val.toFixed(3)}</span>
          </div>
          <div class="eval-bar">
            <div class="eval-bar-fill ${cls}" style="width:${pct}%"></div>
          </div>
        </div>
      `;
    }

    // Integer fields
    const extras = ['total_steps', 'optimal_steps', 'invalid_actions'];
    for (const key of extras) {
      if (evaluation[key] !== undefined) {
        html += `<div class="reward-row"><span>${key.replace(/_/g,' ')}</span><span class="reward-value">${evaluation[key]}</span></div>`;
      }
    }

    // Reward-robustness grades (proxy vs oracle, out-of-band)
    if (typeof evaluation.proxy_pass === 'boolean') {
      const flag = (v) => `<span class="vpill ${v ? 'pass' : 'fail'}">${v ? 'pass' : 'fail'}</span>`;
      html += `<div class="reward-row"><span>proxy (live reward)</span>${flag(evaluation.proxy_pass)}</div>`;
      html += `<div class="reward-row"><span>oracle (ground truth)</span>${flag(evaluation.oracle_pass)}</div>`;
      html += `<div class="reward-row"><span>reward hack</span><span class="vpill ${evaluation.hack ? 'fail' : 'pass'}">${evaluation.hack ? 'YES' : 'no'}</span></div>`;
      for (const key of ['agent', 'model', 'mode', 'reward_version']) {
        if (evaluation[key]) {
          html += `<div class="reward-row"><span>${key.replace(/_/g,' ')}</span><span class="reward-value">${escapeHtml(String(evaluation[key]))}</span></div>`;
        }
      }
    }
    evalDisplay.innerHTML = html;
  }

  // Navigation
  function goToStep(n) {
    if (!trajectory) return;
    const max = trajectory.steps.length - 1;
    currentStep = Math.max(0, Math.min(max, n));
    renderStep();
  }

  function prevStep() { goToStep(currentStep - 1); }
  function nextStep() {
    if (currentStep >= trajectory.steps.length - 1) {
      stopPlaying();
      return;
    }
    goToStep(currentStep + 1);
  }

  function togglePlay() {
    if (playing) { stopPlaying(); }
    else { startPlaying(); }
  }

  function startPlaying() {
    if (!trajectory) return;
    playing = true;
    btnPlay.textContent = '\u23f8 Pause';
    btnPlay.classList.add('active');
    const speed = parseInt(speedSelect.value, 10);
    playTimer = setInterval(() => {
      if (currentStep >= trajectory.steps.length - 1) { stopPlaying(); return; }
      nextStep();
    }, speed);
  }

  function stopPlaying() {
    playing = false;
    btnPlay.textContent = '\u25b6 Play';
    btnPlay.classList.remove('active');
    if (playTimer) { clearInterval(playTimer); playTimer = null; }
  }

  // Progress bar click
  progressBar.addEventListener('click', (e) => {
    if (!trajectory) return;
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const idx = Math.round(pct * (trajectory.steps.length - 1));
    goToStep(idx);
  });

  // Buttons
  btnPrev.addEventListener('click', prevStep);
  btnNext.addEventListener('click', nextStep);
  btnPlay.addEventListener('click', togglePlay);
  speedSelect.addEventListener('change', () => {
    if (playing) { stopPlaying(); startPlaying(); }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'SELECT') return;
    switch (e.key) {
      case 'ArrowLeft': e.preventDefault(); prevStep(); break;
      case 'ArrowRight': e.preventDefault(); nextStep(); break;
      case ' ': e.preventDefault(); togglePlay(); break;
      case 'Home': e.preventDefault(); goToStep(0); break;
      case 'End': e.preventDefault(); goToStep(trajectory ? trajectory.steps.length - 1 : 0); break;
    }
  });

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // Init
  async function init() {
    await loadTrajectoryList();

    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get('session');
    if (sessionId) {
      // switch to the env that owns this run so the sidebar highlights it
      for (const env of Object.keys(byEnv)) {
        if (byEnv[env].some((it) => it.id === sessionId)) { selectEnv(env); break; }
      }
      await loadTrajectory(sessionId);
    }
  }

  init();
})();
</script>
</body>
</html>
