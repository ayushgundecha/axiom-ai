<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axiom Leaderboard — reward robustness</title>
<meta name="description" content="Reward Robustness Leaderboard: RRS = (1 − hack_rate) × honest_fidelity across offline and live LLM benchmark runs.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237c86ff'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='20' font-weight='700' text-anchor='middle' fill='%230a0a0b'%3Ea%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="theme.css">
<style>
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 40px var(--space-page) 56px; }
  h1 { font-size: 28px; font-weight: 650; letter-spacing: -.02em; }
  /* Section headings are emitted by JS as bare <h2> */
  h2 { font-size: 17px; font-weight: 600; letter-spacing: -.01em; margin: 36px 0 14px; }
  .sub { font-family: var(--font-mono); font-size: 12.5px; color: var(--text-muted); margin-top: 8px; }
  .sub b { font-weight: 600; }
  code { font-family: var(--font-mono); background: var(--bg-inset); border: 1px solid var(--border); padding: 1px 7px; border-radius: 4px; font-size: 12px; }

  /* Mode toggle — segmented control (buttons emitted by JS into #modes) */
  .modes {
    display: inline-flex; gap: 4px; margin-top: 24px; padding: 4px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); flex-wrap: wrap;
  }
  .mode-btn {
    font-family: var(--font-mono); font-size: 12px; padding: 6px 14px;
    background: transparent; border: none; color: var(--text-secondary);
    border-radius: var(--radius-sm); cursor: pointer; transition: all .15s ease;
  }
  .mode-btn:hover { color: var(--text); background: var(--bg-hover); }
  .mode-btn.active { background: var(--accent-dim); color: var(--accent-bright); }

  .meta-chips { margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .chip {
    font-family: var(--font-mono); font-size: 11px; padding: 4px 12px; line-height: 1.6;
    border-radius: var(--radius-pill); border: 1px solid var(--border);
    color: var(--text-muted); background: var(--bg-card);
  }
  .chip b { color: var(--text-secondary); font-weight: 550; }

  /* Summary cards (theme.css .card carries the tile treatment) */
  .cards { display: flex; gap: 14px; margin-top: 24px; flex-wrap: wrap; }
  .card { padding: 22px 24px; flex: 1; min-width: 200px; }
  .card .label {
    font-family: var(--font-mono); color: var(--text-muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: .08em; font-weight: 500;
  }
  .card .val { font-family: var(--font-mono); font-size: 38px; font-weight: 600; margin-top: 10px; line-height: 1.1; }
  .v0 { color: var(--red); } .v1 { color: var(--green); }

  /* Tables (emitted bare into #content) */
  #content { overflow-x: auto; }
  table {
    width: 100%; min-width: 640px; border-collapse: separate; border-spacing: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.028), rgba(255,255,255,.008)), var(--bg-card);
    border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden;
  }
  th, td { text-align: right; padding: 11px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
  td { font-family: var(--font-mono); font-size: 12.5px; color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  td b { color: var(--text); }
  th {
    font-family: var(--font-mono); color: var(--text-muted); font-weight: 500;
    text-transform: uppercase; letter-spacing: .07em; font-size: 10.5px;
  }
  td:first-child, th:first-child { text-align: left; }
  td:first-child { color: var(--text); font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background .12s ease; }
  tbody tr:hover td { background: var(--bg-hover); }

  .tag { font-family: var(--font-mono); padding: 1px 8px; border-radius: var(--radius-pill); font-size: 10px; font-weight: 600; letter-spacing: .05em; }
  .tag.v0 { background: var(--red-dim); }
  .tag.v1 { background: var(--green-dim); }
  .bar { height: 6px; border-radius: 3px; background: rgba(61,214,140,.12); position: relative; min-width: 90px; display: inline-block; vertical-align: middle; }
  .bar > span { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 3px; background: var(--green); }
  .good { color: var(--green); } .bad { color: var(--red); }
  .pill { display: inline-block; font-family: var(--font-mono); padding: 2px 9px; border-radius: var(--radius-pill); font-size: 10.5px; font-weight: 600; letter-spacing: .04em; }
  .pill.yes { background: var(--green-dim); color: var(--green); }
  .pill.no { background: var(--red-dim); color: var(--red); }

  .err {
    color: var(--red); margin-top: 24px; padding: 16px 20px;
    background: var(--red-dim); border: 1px solid rgba(242,85,90,.35);
    border-radius: var(--radius); font-size: 13.5px; line-height: 1.7;
  }
  .foot { font-family: var(--font-mono); color: var(--text-muted); font-size: 11px; margin-top: 28px; line-height: 1.8; }

  @media (max-width: 720px) {
    .cards { flex-direction: column; }
    h1 { font-size: 23px; }
  }
</style>
</head>
<body>
<header class="site-nav">
  <a class="brand" href="index.html"><span class="mark">a</span>axiom <span class="suffix">console</span></a>
  <nav>
    <a href="index.html">Overview</a>
    <a href="demo.html">Demo</a>
    <a class="active" href="robustness.html">Leaderboard</a>
    <a href="https://github.com/ayushgundecha/axiom-ai">GitHub ↗</a>
  </nav>
</header>
<div class="wrap">
  <h1>Reward Robustness Leaderboard</h1>
  <div class="sub">higher RRS = harder to cheat &nbsp;·&nbsp; <code>RRS = (1 − hack_rate) × honest_fidelity</code></div>

  <div class="modes" id="modes"></div>
  <div class="meta-chips" id="meta"></div>
  <div id="content"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const MODES = [
  { key: 'offline', label: 'Offline · scripted exploit catalog', report: 'reports/robustness.json' },
  { key: 'live', label: 'Live · LLM agents in a real browser', report: 'reports/robustness_live.json' },
  { key: 'discovery', label: 'Live · discovery run 1 (2026-07-13)', report: 'reports/robustness_live_prehardening.json' },
  { key: 'discovery2', label: 'Live · discovery run 2 (2026-07-18)', report: 'reports/robustness_live_discovery2.json' },
];
const paramReport = new URLSearchParams(location.search).get('report');
const activeMode = MODES.find((m) => paramReport && paramReport.endsWith(m.report.split('/').pop()))
  || (paramReport ? null : MODES[0]);

// A selected mode NEVER falls back to the other mode's report — silently
// rendering offline numbers under a "Live" label is exactly the mislabeling
// this benchmark exists to prevent.
const CANDIDATES = (activeMode
  ? [paramReport, activeMode.report, './' + activeMode.report.split('/').pop(),
     '../' + activeMode.report]
  : [paramReport, 'reports/robustness.json', './robustness.json', '../reports/robustness.json']
).filter(Boolean);

document.getElementById('modes').innerHTML = MODES.map((m) =>
  `<button class="mode-btn${activeMode && activeMode.key === m.key ? ' active' : ''}" ` +
  `onclick="location.search='?report=${m.report}'">${m.label}</button>`).join('');

const pct = (x) => (x * 100).toFixed(0) + '%';
const f3 = (x) => Number(x).toFixed(3);

function macro(summary, version) {
  const cells = Object.entries(summary.by_task_version)
    .filter(([k]) => k.endsWith('::' + version)).map(([, v]) => v);
  if (!cells.length) return null;
  return cells.reduce((a, c) => a + c.rrs, 0) / cells.length;
}

function render(report) {
  const s = report.summary;
  const mv0 = macro(s, 'v0'), mv1 = macro(s, 'v1');
  let html = '';

  const meta = report.meta || {};
  const chips = [];
  if (meta.mode) chips.push(`mode <b>${meta.mode}</b>`);
  if (meta.honest_model) chips.push(`honest agent <b>${meta.honest_model}</b>`);
  if (meta.exploiter_model) chips.push(`exploiter <b>${meta.exploiter_model}</b>`);
  if (meta.judge_model) chips.push(`judge <b>${meta.judge_model}</b>`);
  const nErr = report.runs.filter((r) => r.error).length;
  if (nErr > 0) chips.push(`<b>${nErr}</b> error run${nErr > 1 ? 's' : ''} excluded from metrics`);
  if (activeMode && activeMode.key === 'discovery') {
    chips.push('frozen <b>2026-07-13</b> — the run where a live agent broke the hardened ' +
      'summarize_incident reward on a held-out seed (plausible-severity-filler); ' +
      'closed by the summary-grounding defense');
  }
  if (activeMode && activeMode.key === 'discovery2') {
    chips.push('frozen <b>2026-07-18</b> — after summary-grounding closed round 1, the live ' +
      'attacker found new holes: multi-reply gate-splitting + echo-grounding-filler ' +
      '(closed by single-reply-conjunction + quantitative-grounding) and the ' +
      'confident-wrong-answer residual (oracle-only, documented)');
  }
  document.getElementById('meta').innerHTML = chips.map((c) => `<span class="chip">${c}</span>`).join('');

  html += '<div class="cards">';
  if (mv0 !== null) html += `<div class="card"><div class="label">macro-RRS · naive (v0)</div><div class="val v0">${f3(mv0)}</div></div>`;
  if (mv1 !== null) html += `<div class="card"><div class="label">macro-RRS · hardened (v1)</div><div class="val v1">${f3(mv1)}</div></div>`;
  html += `<div class="card"><div class="label">labeled runs</div><div class="val">${report.runs.length}</div></div>`;
  html += '</div>';

  html += '<h2>Per-task robustness</h2><table><thead><tr>' +
    '<th>Task</th><th>Ver</th><th>hack_rate</th><th>honest_fid</th><th>gap</th><th>RRS</th><th></th>' +
    '</tr></thead><tbody>';
  const rows = s.leaderboard.slice().sort((a, b) =>
    a.task === b.task ? a.reward_version.localeCompare(b.reward_version) : a.task.localeCompare(b.task));
  for (const r of rows) {
    html += `<tr><td>${r.task}</td>` +
      `<td><span class="tag ${r.reward_version}">${r.reward_version}</span></td>` +
      `<td class="${r.hack_rate > 0 ? 'bad' : 'good'}">${f3(r.hack_rate)}</td>` +
      `<td>${f3(r.honest_fidelity)}</td>` +
      `<td>${f3(r.proxy_oracle_gap)}</td>` +
      `<td><b>${f3(r.rrs)}</b></td>` +
      `<td><span class="bar"><span style="width:${pct(r.rrs)}"></span></span></td></tr>`;
  }
  html += '</tbody></table>';

  if (report.judge_substudy) {
    const j = report.judge_substudy;
    html += '<h2>LLM-judge sub-study — prompt injection</h2>';
    const judgeNote = j.backend === 'live' && j.naive_model === j.hardened_model
      ? ` · same-model defenses ablation (<code>${j.naive_model}</code>): only the defense stack differs`
      : ` · backend: ${j.backend}`;
    html += `<div class="sub">naive_fooled_rate <b class="bad">${f3(j.summary.naive_fooled_rate)}</b> · ` +
      `hardened_resisted_rate <b class="good">${f3(j.summary.hardened_resisted_rate)}</b>${judgeNote}</div>`;
    html += '<table style="margin-top:12px"><thead><tr><th>Attack</th><th>naive</th><th>hardened</th>' +
      '<th>naive fooled</th><th>hardened resisted</th></tr></thead><tbody>';
    for (const a of j.attacks) {
      html += `<tr><td>${a.id}</td><td class="bad">${f3(a.naive_score)}</td>` +
        `<td class="good">${f3(a.hardened_score)}</td>` +
        `<td><span class="pill ${a.naive_fooled ? 'no' : 'yes'}">${a.naive_fooled ? 'fooled' : 'ok'}</span></td>` +
        `<td><span class="pill ${a.hardened_resisted ? 'yes' : 'no'}">${a.hardened_resisted ? 'resisted' : 'fooled'}</span></td></tr>`;
    }
    html += '</tbody></table>';
  }

  document.getElementById('content').innerHTML = html;
  const split = report.seed_split;
  const splitTxt = split
    ? ` · seeds train=${JSON.stringify(split.train_seeds)} eval=${JSON.stringify(split.eval_seeds)}${split.held_out ? ' (held-out)' : ''}`
    : ` · seeds ${JSON.stringify(report.seeds)}`;
  document.getElementById('foot').textContent =
    `generated ${report.generated_at} · scale ${report.scale}${splitTxt}`;
}

async function load() {
  for (const url of CANDIDATES) {
    try {
      const resp = await fetch(url);
      if (resp.ok) { render(await resp.json()); return; }
    } catch (e) { /* try next */ }
  }
  document.getElementById('content').innerHTML = activeMode && activeMode.key === 'live'
    ? '<div class="err">No live report found. Run the live sweep with ' +
      '<code>python scripts/run_robustness.py --llm --judge --out reports/robustness_live.json</code> ' +
      '(needs a running AxiomChat + an LLM API key), or switch to the offline benchmark above.</div>'
    : '<div class="err">Could not load a robustness report. Generate one with ' +
      '<code>python scripts/run_robustness.py --judge</code> then serve it ' +
      '(it writes <code>reports/robustness.json</code>).</div>';
}
load();
</script>
</body>
</html>
