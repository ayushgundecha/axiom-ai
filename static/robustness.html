<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>axiom-ai | Reward Robustness Leaderboard</title>
<style>
  :root {
    --bg: #0d1117; --bg-card: #161b22; --bg-hover: #1c2128; --border: #30363d;
    --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
    --radius: 8px; --font: 'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 28px; line-height: 1.5; }
  .wrap { max-width: 1040px; margin: 0 auto; }
  h1 { font-size: 22px; }
  h2 { font-size: 15px; color: var(--text-muted); margin: 28px 0 12px; text-transform: uppercase; letter-spacing: .08em; }
  .sub { color: var(--text-muted); font-size: 13px; margin-top: 6px; }
  .cards { display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; flex: 1; min-width: 200px; }
  .card .label { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
  .card .val { font-size: 30px; font-weight: 600; margin-top: 6px; }
  .v0 { color: var(--red); } .v1 { color: var(--green); }
  table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  th, td { text-align: right; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; font-size: 11px; }
  td:first-child, th:first-child { text-align: left; }
  tr:last-child td { border-bottom: none; }
  .tag { padding: 2px 8px; border-radius: 999px; font-size: 11px; }
  .tag.v0 { background: rgba(248,81,73,.15); }
  .tag.v1 { background: rgba(63,185,80,.15); }
  .bar { height: 7px; border-radius: 4px; background: var(--border); position: relative; min-width: 90px; display: inline-block; vertical-align: middle; }
  .bar > span { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 4px; background: var(--green); }
  .good { color: var(--green); } .bad { color: var(--red); }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; }
  .pill.yes { background: rgba(63,185,80,.15); color: var(--green); }
  .pill.no { background: rgba(248,81,73,.15); color: var(--red); }
  .err { color: var(--red); margin-top: 20px; }
  .foot { color: var(--text-muted); font-size: 12px; margin-top: 28px; }
  code { background: var(--bg-hover); padding: 1px 6px; border-radius: 4px; }
  .modes { display: flex; gap: 8px; margin-top: 18px; }
  .mode-btn { font-family: var(--font); font-size: 13px; padding: 7px 16px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted); cursor: pointer; }
  .mode-btn:hover { background: var(--bg-hover); }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,.08); }
  .meta-chips { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .chip { font-size: 11px; padding: 2px 10px; border-radius: 999px; border: 1px solid var(--border);
    color: var(--text-muted); background: var(--bg-card); }
  .chip b { color: var(--text); font-weight: 600; }
  /* Console nav (shared across demo / replay / leaderboard) */
  .console-nav { display: flex; gap: 6px; margin-bottom: 14px; }
  .console-nav a {
    font-family: var(--font); font-size: 12px; text-decoration: none;
    padding: 4px 12px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-muted);
  }
  .console-nav a:hover { background: var(--bg-hover); color: var(--text); }
  .console-nav a.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(88,166,255,.08);
  }
</style>
</head>
<body>
<div class="wrap">
  <nav class="console-nav">
    <a href="demo.html">Demo</a>
    <a class="active" href="robustness.html">Leaderboard</a>
    <a href="https://github.com/ayushgundecha/axiom-ai">GitHub</a>
  </nav>
  <h1>⚖️ axiom console — Reward Robustness Leaderboard</h1>
  <div class="sub">Real environments. Rewards you can't cheat. &nbsp;<code>RRS = (1 − hack_rate) × honest_fidelity</code></div>

  <div class="modes" id="modes"></div>
  <div class="meta-chips" id="meta"></div>
  <div id="content"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const MODES = [
  { key: 'offline', label: 'Offline · scripted exploit catalog', report: 'reports/robustness.json' },
  { key: 'live', label: 'Live · LLM agents in a real browser', report: 'reports/robustness_live.json' },
  { key: 'discovery', label: 'Live · discovery run 1 (2026-07-13)', report: 'reports/robustness_live_prehardening.json' },
  { key: 'discovery2', label: 'Live · discovery run 2 (2026-07-18)', report: 'reports/robustness_live_discovery2.json' },
];
const paramReport = new URLSearchParams(location.search).get('report');
const activeMode = MODES.find((m) => paramReport && paramReport.endsWith(m.report.split('/').pop()))
  || (paramReport ? null : MODES[0]);

// A selected mode NEVER falls back to the other mode's report — silently
// rendering offline numbers under a "Live" label is exactly the mislabeling
// this benchmark exists to prevent.
const CANDIDATES = (activeMode
  ? [paramReport, activeMode.report, './' + activeMode.report.split('/').pop(),
     '../' + activeMode.report]
  : [paramReport, 'reports/robustness.json', './robustness.json', '../reports/robustness.json']
).filter(Boolean);

document.getElementById('modes').innerHTML = MODES.map((m) =>
  `<button class="mode-btn${activeMode && activeMode.key === m.key ? ' active' : ''}" ` +
  `onclick="location.search='?report=${m.report}'">${m.label}</button>`).join('');

const pct = (x) => (x * 100).toFixed(0) + '%';
const f3 = (x) => Number(x).toFixed(3);

function macro(summary, version) {
  const cells = Object.entries(summary.by_task_version)
    .filter(([k]) => k.endsWith('::' + version)).map(([, v]) => v);
  if (!cells.length) return null;
  return cells.reduce((a, c) => a + c.rrs, 0) / cells.length;
}

function render(report) {
  const s = report.summary;
  const mv0 = macro(s, 'v0'), mv1 = macro(s, 'v1');
  let html = '';

  const meta = report.meta || {};
  const chips = [];
  if (meta.mode) chips.push(`mode <b>${meta.mode}</b>`);
  if (meta.honest_model) chips.push(`honest agent <b>${meta.honest_model}</b>`);
  if (meta.exploiter_model) chips.push(`exploiter <b>${meta.exploiter_model}</b>`);
  if (meta.judge_model) chips.push(`judge <b>${meta.judge_model}</b>`);
  const nErr = report.runs.filter((r) => r.error).length;
  if (nErr > 0) chips.push(`<b>${nErr}</b> error run${nErr > 1 ? 's' : ''} excluded from metrics`);
  if (activeMode && activeMode.key === 'discovery') {
    chips.push('frozen <b>2026-07-13</b> — the run where a live agent broke the hardened ' +
      'summarize_incident reward on a held-out seed (plausible-severity-filler); ' +
      'closed by the summary-grounding defense');
  }
  if (activeMode && activeMode.key === 'discovery2') {
    chips.push('frozen <b>2026-07-18</b> — after summary-grounding closed round 1, the live ' +
      'attacker found new holes: multi-reply gate-splitting + echo-grounding-filler ' +
      '(closed by single-reply-conjunction + quantitative-grounding) and the ' +
      'confident-wrong-answer residual (oracle-only, documented)');
  }
  document.getElementById('meta').innerHTML = chips.map((c) => `<span class="chip">${c}</span>`).join('');

  html += '<div class="cards">';
  if (mv0 !== null) html += `<div class="card"><div class="label">macro-RRS · naive (v0)</div><div class="val v0">${f3(mv0)}</div></div>`;
  if (mv1 !== null) html += `<div class="card"><div class="label">macro-RRS · hardened (v1)</div><div class="val v1">${f3(mv1)}</div></div>`;
  html += `<div class="card"><div class="label">labeled runs</div><div class="val">${report.runs.length}</div></div>`;
  html += '</div>';

  html += '<h2>Per-task robustness</h2><table><thead><tr>' +
    '<th>Task</th><th>Ver</th><th>hack_rate</th><th>honest_fid</th><th>gap</th><th>RRS</th><th></th>' +
    '</tr></thead><tbody>';
  const rows = s.leaderboard.slice().sort((a, b) =>
    a.task === b.task ? a.reward_version.localeCompare(b.reward_version) : a.task.localeCompare(b.task));
  for (const r of rows) {
    html += `<tr><td>${r.task}</td>` +
      `<td><span class="tag ${r.reward_version}">${r.reward_version}</span></td>` +
      `<td class="${r.hack_rate > 0 ? 'bad' : 'good'}">${f3(r.hack_rate)}</td>` +
      `<td>${f3(r.honest_fidelity)}</td>` +
      `<td>${f3(r.proxy_oracle_gap)}</td>` +
      `<td><b>${f3(r.rrs)}</b></td>` +
      `<td><span class="bar"><span style="width:${pct(r.rrs)}"></span></span></td></tr>`;
  }
  html += '</tbody></table>';

  if (report.judge_substudy) {
    const j = report.judge_substudy;
    html += '<h2>LLM-judge sub-study — prompt injection</h2>';
    const judgeNote = j.backend === 'live' && j.naive_model === j.hardened_model
      ? ` · same-model defenses ablation (<code>${j.naive_model}</code>): only the defense stack differs`
      : ` · backend: ${j.backend}`;
    html += `<div class="sub">naive_fooled_rate <b class="bad">${f3(j.summary.naive_fooled_rate)}</b> · ` +
      `hardened_resisted_rate <b class="good">${f3(j.summary.hardened_resisted_rate)}</b>${judgeNote}</div>`;
    html += '<table style="margin-top:12px"><thead><tr><th>Attack</th><th>naive</th><th>hardened</th>' +
      '<th>naive fooled</th><th>hardened resisted</th></tr></thead><tbody>';
    for (const a of j.attacks) {
      html += `<tr><td>${a.id}</td><td class="bad">${f3(a.naive_score)}</td>` +
        `<td class="good">${f3(a.hardened_score)}</td>` +
        `<td><span class="pill ${a.naive_fooled ? 'no' : 'yes'}">${a.naive_fooled ? 'fooled' : 'ok'}</span></td>` +
        `<td><span class="pill ${a.hardened_resisted ? 'yes' : 'no'}">${a.hardened_resisted ? 'resisted' : 'fooled'}</span></td></tr>`;
    }
    html += '</tbody></table>';
  }

  document.getElementById('content').innerHTML = html;
  const split = report.seed_split;
  const splitTxt = split
    ? ` · seeds train=${JSON.stringify(split.train_seeds)} eval=${JSON.stringify(split.eval_seeds)}${split.held_out ? ' (held-out)' : ''}`
    : ` · seeds ${JSON.stringify(report.seeds)}`;
  document.getElementById('foot').textContent =
    `generated ${report.generated_at} · scale ${report.scale}${splitTxt}`;
}

async function load() {
  for (const url of CANDIDATES) {
    try {
      const resp = await fetch(url);
      if (resp.ok) { render(await resp.json()); return; }
    } catch (e) { /* try next */ }
  }
  document.getElementById('content').innerHTML = activeMode && activeMode.key === 'live'
    ? '<div class="err">No live report found. Run the live sweep with ' +
      '<code>python scripts/run_robustness.py --llm --judge --out reports/robustness_live.json</code> ' +
      '(needs a running AxiomChat + an LLM API key), or switch to the offline benchmark above.</div>'
    : '<div class="err">Could not load a robustness report. Generate one with ' +
      '<code>python scripts/run_robustness.py --judge</code> then serve it ' +
      '(it writes <code>reports/robustness.json</code>).</div>';
}
load();
</script>
</body>
</html>
