<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>axiom-ai | Reward Robustness Leaderboard</title>
<style>
  :root {
    --bg: #0d1117; --bg-card: #161b22; --bg-hover: #1c2128; --border: #30363d;
    --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --yellow: #d29922; --red: #f85149; --purple: #bc8cff;
    --radius: 8px; --font: 'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 28px; line-height: 1.5; }
  .wrap { max-width: 1040px; margin: 0 auto; }
  h1 { font-size: 22px; }
  h2 { font-size: 15px; color: var(--text-muted); margin: 28px 0 12px; text-transform: uppercase; letter-spacing: .08em; }
  .sub { color: var(--text-muted); font-size: 13px; margin-top: 6px; }
  .cards { display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; flex: 1; min-width: 200px; }
  .card .label { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: .06em; }
  .card .val { font-size: 30px; font-weight: 600; margin-top: 6px; }
  .v0 { color: var(--red); } .v1 { color: var(--green); }
  table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  th, td { text-align: right; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: .04em; font-size: 11px; }
  td:first-child, th:first-child { text-align: left; }
  tr:last-child td { border-bottom: none; }
  .tag { padding: 2px 8px; border-radius: 999px; font-size: 11px; }
  .tag.v0 { background: rgba(248,81,73,.15); }
  .tag.v1 { background: rgba(63,185,80,.15); }
  .bar { height: 7px; border-radius: 4px; background: var(--border); position: relative; min-width: 90px; display: inline-block; vertical-align: middle; }
  .bar > span { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 4px; background: var(--green); }
  .good { color: var(--green); } .bad { color: var(--red); }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; }
  .pill.yes { background: rgba(63,185,80,.15); color: var(--green); }
  .pill.no { background: rgba(248,81,73,.15); color: var(--red); }
  .err { color: var(--red); margin-top: 20px; }
  .foot { color: var(--text-muted); font-size: 12px; margin-top: 28px; }
  code { background: var(--bg-hover); padding: 1px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>⚖️ axiom-ai — Reward Robustness Leaderboard</h1>
  <div class="sub">Real environments. Rewards you can't cheat. &nbsp;<code>RRS = (1 − hack_rate) × honest_fidelity</code></div>

  <div id="content"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const CANDIDATES = [
  new URLSearchParams(location.search).get('report'),
  'reports/robustness.json', './robustness.json', '../reports/robustness.json',
].filter(Boolean);

const pct = (x) => (x * 100).toFixed(0) + '%';
const f3 = (x) => Number(x).toFixed(3);

function macro(summary, version) {
  const cells = Object.entries(summary.by_task_version)
    .filter(([k]) => k.endsWith('::' + version)).map(([, v]) => v);
  if (!cells.length) return null;
  return cells.reduce((a, c) => a + c.rrs, 0) / cells.length;
}

function render(report) {
  const s = report.summary;
  const mv0 = macro(s, 'v0'), mv1 = macro(s, 'v1');
  let html = '';

  html += '<div class="cards">';
  if (mv0 !== null) html += `<div class="card"><div class="label">macro-RRS · naive (v0)</div><div class="val v0">${f3(mv0)}</div></div>`;
  if (mv1 !== null) html += `<div class="card"><div class="label">macro-RRS · hardened (v1)</div><div class="val v1">${f3(mv1)}</div></div>`;
  html += `<div class="card"><div class="label">labeled runs</div><div class="val">${report.runs.length}</div></div>`;
  html += '</div>';

  html += '<h2>Per-task robustness</h2><table><thead><tr>' +
    '<th>Task</th><th>Ver</th><th>hack_rate</th><th>honest_fid</th><th>gap</th><th>RRS</th><th></th>' +
    '</tr></thead><tbody>';
  const rows = s.leaderboard.slice().sort((a, b) =>
    a.task === b.task ? a.reward_version.localeCompare(b.reward_version) : a.task.localeCompare(b.task));
  for (const r of rows) {
    html += `<tr><td>${r.task}</td>` +
      `<td><span class="tag ${r.reward_version}">${r.reward_version}</span></td>` +
      `<td class="${r.hack_rate > 0 ? 'bad' : 'good'}">${f3(r.hack_rate)}</td>` +
      `<td>${f3(r.honest_fidelity)}</td>` +
      `<td>${f3(r.proxy_oracle_gap)}</td>` +
      `<td><b>${f3(r.rrs)}</b></td>` +
      `<td><span class="bar"><span style="width:${pct(r.rrs)}"></span></span></td></tr>`;
  }
  html += '</tbody></table>';

  if (report.judge_substudy) {
    const j = report.judge_substudy;
    html += '<h2>LLM-judge sub-study — prompt injection</h2>';
    html += `<div class="sub">naive_fooled_rate <b class="bad">${f3(j.summary.naive_fooled_rate)}</b> · ` +
      `hardened_resisted_rate <b class="good">${f3(j.summary.hardened_resisted_rate)}</b> · backend: ${j.backend}</div>`;
    html += '<table style="margin-top:12px"><thead><tr><th>Attack</th><th>naive</th><th>hardened</th>' +
      '<th>naive fooled</th><th>hardened resisted</th></tr></thead><tbody>';
    for (const a of j.attacks) {
      html += `<tr><td>${a.id}</td><td class="bad">${f3(a.naive_score)}</td>` +
        `<td class="good">${f3(a.hardened_score)}</td>` +
        `<td><span class="pill ${a.naive_fooled ? 'no' : 'yes'}">${a.naive_fooled ? 'fooled' : 'ok'}</span></td>` +
        `<td><span class="pill ${a.hardened_resisted ? 'yes' : 'no'}">${a.hardened_resisted ? 'resisted' : 'fooled'}</span></td></tr>`;
    }
    html += '</tbody></table>';
  }

  document.getElementById('content').innerHTML = html;
  const split = report.seed_split;
  const splitTxt = split
    ? ` · seeds train=${JSON.stringify(split.train_seeds)} eval=${JSON.stringify(split.eval_seeds)}${split.held_out ? ' (held-out)' : ''}`
    : ` · seeds ${JSON.stringify(report.seeds)}`;
  document.getElementById('foot').textContent =
    `generated ${report.generated_at} · scale ${report.scale}${splitTxt}`;
}

async function load() {
  for (const url of CANDIDATES) {
    try {
      const resp = await fetch(url);
      if (resp.ok) { render(await resp.json()); return; }
    } catch (e) { /* try next */ }
  }
  document.getElementById('content').innerHTML =
    '<div class="err">Could not load a robustness report. Generate one with ' +
    '<code>python scripts/run_robustness.py --judge</code> then serve it ' +
    '(it writes <code>reports/robustness.json</code>).</div>';
}
load();
</script>
</body>
</html>
