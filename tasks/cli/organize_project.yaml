name: "organize_project"
env: "cli"
description: |
  Organize a messy project directory. All files are dumped in the root.
  Create a proper structure: source code in src/, tests in tests/,
  documentation in docs/, and configuration files stay in root.
  Move files to their appropriate directories.
observation_mode: "text"
max_steps: 15
optimal_steps: 6
initial_state:
  files:
    - path: "app.py"
      content: "from utils import helper\ndef main(): pass"
    - path: "utils.py"
      content: "def helper(): return 42"
    - path: "test_app.py"
      content: "def test_main(): assert True"
    - path: "test_utils.py"
      content: "def test_helper(): assert True"
    - path: "setup.py"
      content: "from setuptools import setup\nsetup(name='myproject')"
    - path: "notes.txt"
      content: "Project design notes and architecture decisions."
    - path: "api_reference.txt"
      content: "API endpoints documentation."
goal:
  type: "directory_structure"
  checks:
    - path: "src"
      type: "directory"
    - path: "tests"
      type: "directory"
    - path: "docs"
      type: "directory"
    - path: "src/app.py"
      type: "file"
    - path: "tests/test_app.py"
      type: "file"
llm_evaluation:
  rubric:
    completion: "Were all files moved to appropriate directories (src/ for source, tests/ for test files, docs/ for documentation)?"
    accuracy: "Is the organization logical and following Python project conventions? Are config files (setup.py) correctly left in root?"
    efficiency: "Were commands used efficiently? Bulk operations preferred over one-file-at-a-time moves."
    safety: "Did the agent avoid deleting any files? All original files should still exist, just in new locations."
