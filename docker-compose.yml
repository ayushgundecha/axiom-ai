services:
  # Real todo web app (target application for WebApp environment)
  todo-app:
    build: ./apps/todo-app
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      retries: 3
      start_period: 5s

  # AxiomChat — deterministic mini-Slack (target app for the axiomchat env)
  axiomchat-app:
    build: ./apps/axiomchat
    ports:
      - "3100:3000"
    environment:
      # Override the oracle token in any real deployment.
      - AXIOMCHAT_ORACLE_TOKEN=axiom-oracle-dev-token
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:3000/api/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 5s
      retries: 5
      start_period: 5s

  # axiom-ai server (orchestrator + Playwright)
  axiom:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      todo-app:
        condition: service_healthy
      axiomchat-app:
        condition: service_healthy
    environment:
      - AXIOM_TODO_APP_URL=http://todo-app:3000
      - AXIOM_AXIOMCHAT_APP_URL=http://axiomchat-app:3000
      - AXIOM_AXIOMCHAT_ORACLE_TOKEN=axiom-oracle-dev-token
      - AXIOM_LOG_LEVEL=info
      - AXIOM_LOG_FORMAT=console
    volumes:
      - ./tasks:/app/tasks:ro
      - ./trajectories:/app/trajectories
