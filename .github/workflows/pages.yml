name: Pages

on:
  push:
    branches: [main]
    paths:
      - "static/**"
      - "reports/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble console (leaderboard + demo viewer + committed reports & transcripts)
        run: |
          mkdir -p site/reports
          cp static/robustness.html site/index.html
          cp static/robustness.html site/robustness.html
          cp static/demo.html site/demo.html
          cp reports/*.json site/reports/
          cp -R reports/transcripts site/reports/transcripts
      - uses: actions/configure-pages@v5
        with:
          # Enable Pages (build type = GitHub Actions) on first run using the
          # workflow's own pages:write token — no manual repo-settings step.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
